services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  bronze-importer:
    build:
      context: .
    depends_on:
      - minio
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bronze}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      BRONZE_DATASET_SLUG: ${BRONZE_DATASET_SLUG:-skihikingkevin/csgo-matchmaking-damage}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      BRONZE_RUN_ID: ${BRONZE_RUN_ID:-}

volumes:
  minio-data:
