services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: ${PG_USER:-raguser}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ragpassword}
      POSTGRES_DB: ${PG_DATABASE:-ragdb}
    ports:
      - "54330:5432"
    volumes:
      - tsdb-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-raguser} -d ${PG_DATABASE:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_started
      ollama:
        condition: service_started
    environment:
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}
      PG_TABLE_NAME: ${PG_TABLE_NAME:-rag_embeddings}
      PG_EMBED_DIM: ${PG_EMBED_DIM:-768}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bronze}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DEFAULT_LLM: ${DEFAULT_LLM:-ollama/qwen2.5}
      DEFAULT_EMBED_MODEL: ${DEFAULT_EMBED_MODEL:-ollama/nomic-embed}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_ENDPOINT: http://otel-collector:4318

  # --- Observability (docker compose --profile observability up -d) ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles:
      - observability
    volumes:
      - ./infra/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"

  jaeger:
    image: jaegertracing/jaeger:latest
    profiles:
      - observability
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - observability
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    profiles:
      - observability
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin

  bronze-importer:
    build:
      context: .
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bronze}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      BRONZE_DATASET_SLUG: ${BRONZE_DATASET_SLUG:-skihikingkevin/csgo-matchmaking-damage}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      BRONZE_RUN_ID: ${BRONZE_RUN_ID:-}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  silver-transformer:
    build:
      context: .
    command: ["silver-transform"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bronze}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      BRONZE_SOURCE_RUN_ID: ${BRONZE_SOURCE_RUN_ID:-}
      SILVER_BUCKET: ${SILVER_BUCKET:-silver}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      SILVER_RUN_ID: ${SILVER_RUN_ID:-}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  gold-transformer:
    build:
      context: .
    command: ["gold-transform"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      SILVER_BUCKET: ${SILVER_BUCKET:-silver}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      SILVER_SOURCE_RUN_ID: ${SILVER_SOURCE_RUN_ID:-}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      GOLD_RUN_ID: ${GOLD_RUN_ID:-}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  document-builder:
    build:
      context: .
    command: ["document-build"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      GOLD_SOURCE_RUN_ID: ${GOLD_SOURCE_RUN_ID:-}
      DOCUMENT_BUCKET: ${DOCUMENT_BUCKET:-}
      DOCUMENT_DATASET_PREFIX: ${DOCUMENT_DATASET_PREFIX:-}
      DOCUMENT_RUN_ID: ${DOCUMENT_RUN_ID:-}
      DOCUMENT_PART_SIZE_ROWS: ${DOCUMENT_PART_SIZE_ROWS:-100000}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

volumes:
  minio-data:
  tsdb-data:
  ollama-data:
  grafana-data:
