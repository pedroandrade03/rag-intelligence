services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    environment:
      POSTGRES_USER: ${PG_USER:-raguser}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-ragpassword}
      POSTGRES_DB: ${PG_DATABASE:-ragdb}
    ports:
      - "54330:5432"
    volumes:
      - tsdb-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-raguser} -d ${PG_DATABASE:-ragdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    environment:
      OLLAMA_NUM_PARALLEL: ${OLLAMA_NUM_PARALLEL:-4}
    volumes:
      - ollama-data:/root/.ollama

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      timescaledb:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}
      PG_TABLE_NAME: ${PG_TABLE_NAME:-rag_embeddings}
      PG_EMBED_DIM: ${PG_EMBED_DIM:-768}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bronze}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      OLLAMA_BASE_URL: ${COMPOSE_OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DEFAULT_LLM: ${DEFAULT_LLM:-ollama/qwen2.5}
      DEFAULT_EMBED_MODEL: ${DEFAULT_EMBED_MODEL:-ollama/nomic-embed-text}
      DEFAULT_EMBEDDING_RUN_ID: ${DEFAULT_EMBEDDING_RUN_ID:-${EMBEDDING_RUN_ID:-}}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_ENDPOINT: http://otel-collector:4318

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3002:3000"
    depends_on:
      - rag-api
    environment:
      RAG_API_URL: ${RAG_API_URL:-http://rag-api:8000}
      EMBEDDING_RUN_ID: ${EMBEDDING_RUN_ID:-}
      OLLAMA_BASE_URL: ${COMPOSE_OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b-instruct}

  # --- Observability (docker compose --profile observability up -d) ---

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles:
      - observability
    volumes:
      - ./infra/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"

  jaeger:
    image: jaegertracing/jaeger:latest
    profiles:
      - observability
    ports:
      - "16686:16686"

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - observability
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    profiles:
      - observability
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin

  # --- MLflow (docker compose --profile mlflow up -d) ---

  mlflow-db-init:
    image: postgres:16-alpine
    profiles:
      - mlflow
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      PGHOST: timescaledb
      PGPORT: "5432"
      PGUSER: ${PG_USER:-raguser}
      PGPASSWORD: ${PG_PASSWORD:-ragpassword}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        until pg_isready -h timescaledb -p 5432 -U "$${PGUSER}"; do sleep 1; done
        if ! psql -h timescaledb -U "$${PGUSER}" -d postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'mlflow'" | grep -q 1; then
          psql -h timescaledb -U "$${PGUSER}" -d postgres -c "CREATE DATABASE mlflow OWNER \"$${PGUSER}\";"
        fi
    restart: "no"

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    image: rag-intelligence-mlflow:local
    profiles:
      - mlflow
    depends_on:
      timescaledb:
        condition: service_healthy
      mlflow-db-init:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      MLFLOW_PG_USER: ${PG_USER:-raguser}
      MLFLOW_PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        exec mlflow server --host 0.0.0.0 --port 5000 \
          --backend-store-uri "postgresql://$${MLFLOW_PG_USER}:$${MLFLOW_PG_PASSWORD}@timescaledb:5432/mlflow" \
          --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-artifacts:/mlflow/artifacts

  train-logreg:
    build:
      context: .
      dockerfile: Dockerfile.train
    command: ["train-logreg"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      GOLD_SOURCE_RUN_ID: ${GOLD_SOURCE_RUN_ID:-}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-csgo_round_next_winner}
      TRAIN_RUN_ID: ${TRAIN_RUN_ID:-}
      TRAIN_MODEL_NAME: logistic_regression
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  train-histgbt:
    build:
      context: .
      dockerfile: Dockerfile.train
    command: ["train-histgbt"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      GOLD_SOURCE_RUN_ID: ${GOLD_SOURCE_RUN_ID:-}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-csgo_round_next_winner}
      TRAIN_RUN_ID: ${TRAIN_RUN_ID:-}
      TRAIN_MODEL_NAME: hist_gradient_boosting
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  train-baseline:
    build:
      context: .
      dockerfile: Dockerfile.train
    command: ["train-baseline"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
      mlflow:
        condition: service_started
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      GOLD_SOURCE_RUN_ID: ${GOLD_SOURCE_RUN_ID:-}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_EXPERIMENT_NAME: ${MLFLOW_EXPERIMENT_NAME:-csgo_round_next_winner}
      TRAIN_RUN_ID: ${TRAIN_RUN_ID:-}
      TRAIN_MODEL_NAME: baseline
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  doc-embedder:
    build:
      context: .
      dockerfile: Dockerfile.train
    command: ["embed-docs"]
    profiles:
      - jobs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}
      PG_TABLE_NAME: ${PG_TABLE_NAME:-rag_embeddings}
      PG_EMBED_DIM: ${PG_EMBED_DIM:-768}
      OLLAMA_BASE_URL: ${COMPOSE_OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DEFAULT_EMBED_MODEL: ${DEFAULT_EMBED_MODEL:-ollama/nomic-embed-text}

  bronze-importer:
    build:
      context: .
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bronze}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      KAGGLE_USERNAME: ${KAGGLE_USERNAME:-}
      KAGGLE_KEY: ${KAGGLE_KEY:-}
      BRONZE_DATASET_SLUG: ${BRONZE_DATASET_SLUG:-skihikingkevin/csgo-matchmaking-damage}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      BRONZE_RUN_ID: ${BRONZE_RUN_ID:-}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  silver-transformer:
    build:
      context: .
    command: ["silver-transform"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-bronze}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      BRONZE_SOURCE_RUN_ID: ${BRONZE_SOURCE_RUN_ID:-}
      SILVER_BUCKET: ${SILVER_BUCKET:-silver}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      SILVER_RUN_ID: ${SILVER_RUN_ID:-}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  gold-transformer:
    build:
      context: .
    command: ["gold-transform"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      SILVER_BUCKET: ${SILVER_BUCKET:-silver}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      SILVER_SOURCE_RUN_ID: ${SILVER_SOURCE_RUN_ID:-}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      GOLD_RUN_ID: ${GOLD_RUN_ID:-}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  document-builder:
    build:
      context: .
    command: ["document-build"]
    profiles:
      - jobs
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      GOLD_SOURCE_RUN_ID: ${GOLD_SOURCE_RUN_ID:-}
      DOCUMENT_BUCKET: ${DOCUMENT_BUCKET:-}
      DOCUMENT_DATASET_PREFIX: ${DOCUMENT_DATASET_PREFIX:-}
      DOCUMENT_RUN_ID: ${DOCUMENT_RUN_ID:-}
      DOCUMENT_PART_SIZE_ROWS: ${DOCUMENT_PART_SIZE_ROWS:-100000}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}

  embedding-ingestor:
    build:
      context: .
    command: ["embedding-ingest"]
    profiles:
      - jobs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      minio:
        condition: service_started
      timescaledb:
        condition: service_healthy
    environment:
      MINIO_ENDPOINT: ${COMPOSE_MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      GOLD_BUCKET: ${GOLD_BUCKET:-gold}
      DOCUMENT_BUCKET: ${DOCUMENT_BUCKET:-}
      BRONZE_DATASET_PREFIX: ${BRONZE_DATASET_PREFIX:-csgo-matchmaking-damage}
      SILVER_DATASET_PREFIX: ${SILVER_DATASET_PREFIX:-}
      GOLD_DATASET_PREFIX: ${GOLD_DATASET_PREFIX:-}
      DOCUMENT_DATASET_PREFIX: ${DOCUMENT_DATASET_PREFIX:-}
      DOCUMENT_SOURCE_RUN_ID: ${DOCUMENT_SOURCE_RUN_ID:-}
      EMBEDDING_REPORT_BUCKET: ${EMBEDDING_REPORT_BUCKET:-}
      EMBEDDING_DATASET_PREFIX: ${EMBEDDING_DATASET_PREFIX:-}
      EMBEDDING_RUN_ID: ${EMBEDDING_RUN_ID:-}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-256}
      EMBEDDING_NUM_WORKERS: ${EMBEDDING_NUM_WORKERS:-4}
      EMBEDDING_PARALLEL_BATCHES: ${EMBEDDING_PARALLEL_BATCHES:-4}
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}
      PG_TABLE_NAME: ${PG_TABLE_NAME:-rag_embeddings}
      PG_EMBED_DIM: ${PG_EMBED_DIM:-768}
      OLLAMA_BASE_URL: ${COMPOSE_OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DEFAULT_EMBED_MODEL: ${DEFAULT_EMBED_MODEL:-ollama/nomic-embed-text}

  semantic-searcher:
    build:
      context: .
    entrypoint: ["semantic-search"]
    profiles:
      - jobs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      PG_HOST: timescaledb
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-raguser}
      PG_PASSWORD: ${PG_PASSWORD:-ragpassword}
      PG_DATABASE: ${PG_DATABASE:-ragdb}
      PG_TABLE_NAME: ${PG_TABLE_NAME:-rag_embeddings}
      PG_EMBED_DIM: ${PG_EMBED_DIM:-768}
      OLLAMA_BASE_URL: ${COMPOSE_OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_EMBED_BATCH_SIZE: ${OLLAMA_EMBED_BATCH_SIZE:-32}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      DEFAULT_EMBED_MODEL: ${DEFAULT_EMBED_MODEL:-ollama/nomic-embed-text}

volumes:
  minio-data:
  tsdb-data:
  ollama-data:
  grafana-data:
  mlflow-artifacts:
